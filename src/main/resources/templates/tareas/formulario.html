<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tarea.id == null ? 'Nueva Tarea' : 'Editar Tarea'} + ' - Gestor de Tareas'">Formulario Tarea</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<!-- Navegación -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/home">
            <i class="fas fa-tasks"></i> Gestor de Tareas
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/home">
                        <i class="fas fa-home"></i> Inicio
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/tareas">
                        <i class="fas fa-list-check"></i> Tareas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/categorias">
                        <i class="fas fa-tags"></i> Categorías
                    </a>
                </li>
            </ul>

            <div class="navbar-nav">
                    <span class="navbar-text me-3">
                        <i class="fas fa-user"></i>
                        <span th:text="${session.usuario.nombre}">Usuario</span>
                    </span>
                <a class="btn btn-outline-light btn-sm" href="/auth/logout">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- Contenido principal -->
<main class="py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="fas fa-tasks"></i>
                            <span th:text="${tarea.id == null ? 'Nueva Tarea' : 'Editar Tarea'}">Formulario</span>
                        </h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/tareas/guardar}" th:object="${tarea}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label for="titulo" class="form-label">
                                    <i class="fas fa-heading"></i> Título
                                </label>
                                <input type="text" class="form-control" id="titulo"
                                       th:field="*{titulo}" required>
                                <div th:if="${#fields.hasErrors('titulo')}" class="text-danger small">
                                    <span th:errors="*{titulo}"></span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="descripcion" class="form-label">
                                    <i class="fas fa-align-left"></i> Descripción
                                </label>
                                <textarea class="form-control" id="descripcion"
                                          th:field="*{descripcion}" rows="4"></textarea>
                                <div th:if="${#fields.hasErrors('descripcion')}" class="text-danger small">
                                    <span th:errors="*{descripcion}"></span>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="categoria" class="form-label">
                                        <i class="fas fa-tag"></i> Categoría
                                    </label>
                                    <select class="form-select" id="categoria" th:field="*{categoria.id}">
                                        <option value="">Sin categoría</option>
                                        <option th:each="cat : ${categorias}"
                                                th:value="${cat.id}"
                                                th:text="${cat.nombre}">Categoría</option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="prioridad" class="form-label">
                                        <i class="fas fa-flag"></i> Prioridad
                                    </label>
                                    <select class="form-select" id="prioridad" th:field="*{prioridad}" required>
                                        <option th:each="p : ${prioridades}"
                                                th:value="${p}"
                                                th:text="${p}">Prioridad</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="fechaLimite" class="form-label">
                                    <i class="fas fa-calendar"></i> Fecha Límite
                                </label>
                                <input type="date" class="form-control" id="fechaLimite"
                                       th:field="*{fechaLimite}" required>
                                <div th:if="${#fields.hasErrors('fechaLimite')}" class="text-danger small">
                                    <span th:errors="*{fechaLimite}"></span>
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/tareas" class="btn btn-secondary me-md-2">
                                    <i class="fas fa-times"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i>
                                    <span th:text="${tarea.id == null ? 'Guardar' : 'Actualizar'}">Guardar</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
