<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' - Gestor de Tareas'">Gestor de Tareas</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Personalizado -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<!-- Navegación -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary" th:if="${session.usuario != null}">
    <div class="container">
        <a class="navbar-brand" href="/home">
            <i class="fas fa-tasks"></i> Gestor de Tareas
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/home') ? 'active' : ''}"
                       href="/home">
                        <i class="fas fa-home"></i> Inicio
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/tareas') ? 'active' : ''}"
                       href="/tareas">
                        <i class="fas fa-list-check"></i> Tareas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/categorias') ? 'active' : ''}"
                       href="/categorias">
                        <i class="fas fa-tags"></i> Categorías
                    </a>
                </li>
            </ul>

            <div class="navbar-nav">
                    <span class="navbar-text me-3">
                        <i class="fas fa-user"></i>
                        <span th:text="${session.usuario.nombre}">Usuario</span>
                    </span>
                <a class="btn btn-outline-light btn-sm" href="/auth/logout">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- Contenido principal -->
<main class="py-4">
    <div class="container">
        <!-- Mensajes flash -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Contenido específico de cada página -->
        <div th:replace="${content}"></div>
    </div>
</main>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
